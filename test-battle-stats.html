<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>对战属性验证测试</title>
  <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 20px; background: #f0f2f5; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { background: white; border-radius: 12px; padding: 24px; margin: 16px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { color: #333; }
    h2 { color: #667eea; border-bottom: 2px solid #667eea; padding-bottom: 8px; }
    .btn { padding: 12px 24px; margin: 8px; border: none; border-radius: 8px; cursor: pointer; color: white; font-size: 14px; font-weight: 600; }
    .btn-primary { background: #667eea; }
    .btn-success { background: #4caf50; }
    .btn-warning { background: #ff9800; }
    .result { padding: 15px; margin: 15px 0; border-radius: 8px; }
    .result.success { background: #e8f5e9; border-left: 4px solid #4caf50; }
    .result.error { background: #ffebee; border-left: 4px solid #f44336; }
    .result.info { background: #e3f2fd; border-left: 4px solid #2196f3; }
    .stats-display { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin: 20px 0; }
    .stat-item { text-align: center; padding: 16px; background: #f8f9fa; border-radius: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; }
    .stat-label { font-size: 12px; color: #666; margin-top: 4px; }
    .log { max-height: 300px; overflow-y: auto; background: #f9f9f9; border-radius: 8px; padding: 15px; font-family: monospace; font-size: 13px; }
    .log-entry { padding: 4px 0; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚔️ 对战属性验证测试</h1>
    
    <div class="card">
      <h2>🧪 测试控制</h2>
      <div>
        <button class="btn btn-primary" onclick="createTestPlayer()">创建测试角色</button>
        <button class="btn btn-success" onclick="generateTestBones()">生成测试魂骨</button>
        <button class="btn btn-warning" onclick="runFullTest()">运行完整测试</button>
        <button class="btn btn-warning" onclick="clearTestData()">清空测试数据</button>
      </div>
    </div>

    <div class="card">
      <h2>📊 预期结果</h2>
      <div id="expectedStats" class="result info">
        点击"运行完整测试"查看预期结果
      </div>
    </div>

    <div class="card">
      <h2>📈 实际计算结果</h2>
      <div id="actualStats" class="result info">
        等待计算...
      </div>
    </div>

    <div class="card">
      <h2>📝 测试日志</h2>
      <div id="logContainer" class="log"></div>
    </div>
  </div>

  <script>
    const db = new Dexie('speliday_db');
    db.version(13).stores({
      playerProfiles: '++id, playerName, totalPoints, level, lastPlayedAt, avatar',
      soulBones: '++id, playerId, beastType, slot, isIdentified, isEquipped, attributeType, attributeValue'
    });

    const SOUL_BONE_TYPES = {
      mantuo: { name: '曼陀罗蛇' },
      rougu: { name: '柔骨兔' },
      xiehou: { name: '邪眸白虎' },
      youming: { name: '幽冥灵猫' },
      qibao: { name: '七宝琉璃' }
    };

    const SOUL_BONE_SLOTS = ['head', 'body', 'left_arm', 'right_leg', 'external'];
    const SOUL_BONE_SLOT_NAMES = { head: '头骨', body: '躯干骨', left_arm: '左臂骨', right_leg: '右腿骨', external: '外附魂骨' };

    const BASE_PLAYER_STATS = {
      health: 1000,
      defense: 0,
      dodge: 0,
      knockback: 1,
      zombieSlow: 0
    };

    let testPlayerId = null;

    function log(message, type = 'info') {
      const container = document.getElementById('logContainer');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      const color = type === 'success' ? '#27ae60' : type === 'error' ? '#e74c3c' : '#667eea';
      entry.innerHTML = `[${new Date().toLocaleTimeString()}] <span style="color: ${color};">${message}</span>`;
      container.insertBefore(entry, container.firstChild);
    }

    async function createTestPlayer() {
      log('创建测试角色...', 'info');
      const existing = await db.playerProfiles.where('playerName').equals('对战属性测试').first();
      if (existing) {
        testPlayerId = existing.id;
        log(`✅ 已存在测试角色 (ID: ${testPlayerId})`, 'success');
      } else {
        testPlayerId = await db.playerProfiles.add({
          playerName: '对战属性测试',
          totalPoints: 0,
          level: 1,
          lastPlayedAt: Date.now()
        });
        log(`✅ 已创建测试角色 (ID: ${testPlayerId})`, 'success');
      }
    }

    async function generateTestBones() {
      if (!testPlayerId) await createTestPlayer();
      
      log('生成测试魂骨...', 'info');
      await db.soulBones.where('playerId').equals(testPlayerId).delete();

      // 生成5件已装备且已鉴定的魂骨
      const testBones = [
        { beastType: 'mantuo', slot: 'head', attributeType: 'health', attributeValue: 7, attributeName: '生命' },
        { beastType: 'mantuo', slot: 'body', attributeType: 'defense', attributeValue: 12, attributeName: '防御' },
        { beastType: 'mantuo', slot: 'left_arm', attributeType: 'slow', attributeValue: 4, attributeName: '减速' },
        { beastType: 'rougu', slot: 'right_leg', attributeType: 'dodge', attributeValue: 10, attributeName: '闪避' },
        { beastType: 'xiehou', slot: 'external', attributeType: 'knockback', attributeValue: 15, attributeName: '击退' }
      ];

      for (const bone of testBones) {
        await db.soulBones.add({
          playerId: testPlayerId,
          beastType: bone.beastType,
          slot: bone.slot,
          isIdentified: true,
          isEquipped: true,
          attributeType: bone.attributeType,
          attributeValue: bone.attributeValue
        });
      }

      log('✅ 已生成5件测试魂骨', 'success');
      return testBones;
    }

    // 计算玩家属性（与应用相同的逻辑）
    function calculatePlayerStats(equippedBones) {
      let stats = { ...BASE_PLAYER_STATS };
      
      equippedBones.forEach(bone => {
        switch (bone.attributeType) {
          case 'health': stats.health += bone.attributeValue; break;
          case 'defense': stats.defense += bone.attributeValue; break;
          case 'dodge': stats.dodge += bone.attributeValue / 100; break;
          case 'knockback': stats.knockback += bone.attributeValue / 100; break;
          case 'slow': stats.zombieSlow += bone.attributeValue / 100; break;
        }
      });
      
      stats.dodge = Math.min(stats.dodge, 0.8);
      stats.zombieSlow = Math.min(stats.zombieSlow, 0.5);
      
      return stats;
    }

    async function runFullTest() {
      log('🚀 开始完整测试...', 'info');

      await generateTestBones();

      const bones = await db.soulBones.where('playerId').equals(testPlayerId).toArray();
      const equipped = bones.filter(b => b.isEquipped && b.isIdentified);

      log(`找到 ${bones.length} 个魂骨，其中 ${equipped.length} 个已装备且已鉴定`, 'info');

      const stats = calculatePlayerStats(equipped);

      // 预期结果
      const expectedHealth = 1000 + 7;
      const expectedDefense = 0 + 12;
      const expectedDodge = 0 + 10 / 100;
      const expectedKnockback = 1 + 15 / 100;
      const expectedSlow = 0 + 4 / 100;

      document.getElementById('expectedStats').innerHTML = `
        <div class="stats-display">
          <div class="stat-item">
            <div class="stat-value" style="color: #e74c3c;">${expectedHealth}</div>
            <div class="stat-label">❤️ 生命值 (1000+7)</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" style="color: #2ecc71;">${expectedDefense}</div>
            <div class="stat-label">🛡️ 防御力 (0+12)</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" style="color: #3498db;">${(expectedDodge * 100).toFixed(1)}%</div>
            <div class="stat-label">💨 闪避率 (0%+10%)</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" style="color: #e67e22;">${(expectedKnockback * 100).toFixed(0)}%</div>
            <div class="stat-label">💥 击退效果 (100%+15%)</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" style="color: #9b59b6;">${(expectedSlow * 100).toFixed(1)}%</div>
            <div class="stat-label">❄️ 僵尸减速 (0%+4%)</div>
          </div>
        </div>
      `;

      // 实际计算结果
      const allMatch = 
        Math.abs(stats.health - expectedHealth) < 0.01 &&
        Math.abs(stats.defense - expectedDefense) < 0.01 &&
        Math.abs(stats.dodge - expectedDodge) < 0.001 &&
        Math.abs(stats.knockback - expectedKnockback) < 0.001 &&
        Math.abs(stats.zombieSlow - expectedSlow) < 0.001;

      document.getElementById('actualStats').className = `result ${allMatch ? 'success' : 'error'}`;
      document.getElementById('actualStats').innerHTML = `
        <div style="font-weight: bold; margin-bottom: 10px;">${allMatch ? '✅ 测试通过！' : '❌ 测试失败！'}</div>
        <div class="stats-display">
          <div class="stat-item">
            <div class="stat-value" style="color: #e74c3c;">${Math.round(stats.health)}</div>
            <div class="stat-label">❤️ 生命值 ${Math.abs(stats.health - expectedHealth) < 0.01 ? '✅' : '❌'}</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" style="color: #2ecc71;">${Math.round(stats.defense)}</div>
            <div class="stat-label">🛡️ 防御力 ${Math.abs(stats.defense - expectedDefense) < 0.01 ? '✅' : '❌'}</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" style="color: #3498db;">${(stats.dodge * 100).toFixed(1)}%</div>
            <div class="stat-label">💨 闪避率 ${Math.abs(stats.dodge - expectedDodge) < 0.001 ? '✅' : '❌'}</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" style="color: #e67e22;">${(stats.knockback * 100).toFixed(0)}%</div>
            <div class="stat-label">💥 击退效果 ${Math.abs(stats.knockback - expectedKnockback) < 0.001 ? '✅' : '❌'}</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" style="color: #9b59b6;">${(stats.zombieSlow * 100).toFixed(1)}%</div>
            <div class="stat-label">❄️ 僵尸减速 ${Math.abs(stats.zombieSlow - expectedSlow) < 0.001 ? '✅' : '❌'}</div>
          </div>
        </div>
      `;

      if (allMatch) {
        log('🎉 所有属性计算正确！', 'success');
      } else {
        log('❌ 存在计算错误', 'error');
        log(`预期: HP=${expectedHealth}, DEF=${expectedDefense}, Dodge=${expectedDodge}, Knockback=${expectedKnockback}, Slow=${expectedSlow}`, 'error');
        log(`实际: HP=${stats.health}, DEF=${stats.defense}, Dodge=${stats.dodge}, Knockback=${stats.knockback}, Slow=${stats.zombieSlow}`, 'error');
      }
    }

    async function clearTestData() {
      await db.soulBones.where('playerId').equals(testPlayerId).delete();
      await db.playerProfiles.where('playerName').equals('对战属性测试').delete();
      testPlayerId = null;
      log('🗑️ 已清空测试数据', 'info');
      document.getElementById('expectedStats').innerHTML = '等待测试...';
      document.getElementById('actualStats').innerHTML = '等待计算...';
    }

    window.onload = () => {
      log('测试页面已加载，点击"运行完整测试"开始验证', 'info');
    };
  </script>
</body>
</html>
